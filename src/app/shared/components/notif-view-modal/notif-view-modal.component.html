@if (visible()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm bg-black/40"
    (click)="close()"
  >
    <!-- Card — detiene el click para no cerrar al tocar dentro -->
    <div
      class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-auto overflow-hidden animate-fade-in"
      (click)="$event.stopPropagation()"
    >
      <!-- Header con gradiente igual al de la credencial -->
      <div class="relative bg-gradient-to-r from-[#00b8da] to-[#00c951] p-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <!-- Ícono de campana -->
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
            <path fill="white" d="M5 19q-.425 0-.712-.288T4 18t.288-.712T5 18h1v-7q0-2.075 1.25-3.687T10.5 5.2V4.5q0-.625.438-1.062T12 3t1.063.438T13.5 4.5v.7q2 .5 3.25 2.113T18 11v7h1q.425 0 .713.288T20 19t-.288.713T19 20H5zm7 3q-.825 0-1.412-.587T10 20h4q0 .825-.587 1.413T12 22z"/>
          </svg>
          <p class="text-white font-bold text-sm">Nueva notificación</p>
        </div>
        <!-- Botón X -->
        <button
          (click)="close()"
          class="text-white/80 hover:text-white text-2xl font-bold leading-none cursor-pointer"
          aria-label="Cerrar"
        >&times;</button>
      </div>

      <!-- Contenido -->
      <div class="p-5">
        <h3 class="text-base font-bold text-gray-800 mb-2">{{ titulo() }}</h3>
        <p class="text-sm text-gray-600 leading-relaxed">{{ cuerpo() }}</p>
      </div>

      <!-- Footer -->
      <div class="px-5 pb-5 flex justify-end">
        <button
          (click)="close()"
          class="cursor-pointer px-5 py-2 bg-cyan-600 hover:bg-cyan-700 text-white text-sm font-semibold rounded-xl transition-colors"
        >
          Cerrar
        </button>
      </div>
    </div>
  </div>
}
